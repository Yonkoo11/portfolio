<!DOCTYPE html>
<html>
<head>
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: #faf8f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Clash Display', system-ui, sans-serif;
    }
    h1 {
      font-size: 120px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 16px;
    }
    h1 span {
      color: #e85d4c;
    }
    p {
      font-size: 32px;
      font-weight: 600;
      color: #6b6b6b;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <h1>Dr. <span>Alex</span></h1>
  <p>Web3 Engineer</p>
</body>
</html>
